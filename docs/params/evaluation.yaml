# 评估参数 SSOT — 修改参数值只改这里
# 所有 .md 文件仅引用本文件，不复制数值

# === 因子评估门槛 ===
sharpe_abs_net_min: 0.9       # LS Sharpe 下限
ir_ls_min: 0.2                # IR(LS) 下限
long_excess_net_sharpe_min: 0.7  # Long Excess Net Sharpe 下限
mono_min: 0.7                 # 单调性下限 (8 组)
coverage_min: 0.3             # 数据覆盖率下限

# === 回测参数 ===
mode: long_short
num_groups: 8
post_process_method: comp
execution_price_field: twap_1300_1400
benchmark_index: csi1000
commission_rate: 0.0001
neutralize: true

# === 相关性 Gate 阈值 ===
# 用于 admit_rawdata.py 的可插拔 gate
corr_gate:
  default_gate: pairwise        # pairwise | incremental_sharpe
  pairwise:
    ls_threshold: 0.60          # max |ρ(LS PnL)| 上限
    lb_threshold: 0.80          # max |ρ(Long-Benchmark PnL)| 上限
  incremental_sharpe:
    threshold: 0.30             # 增量 Sharpe 下限

# === Alpha 侧 Official Cache ===
# rawdata 不维护自己的 pnl cache，直接读取 alpha 侧数据
alpha_official_cache:
  project_root: /home/gkh/claude_tasks/ashare_alpha
  composite_root: .claude-tmp/pnl_cache/official_composite
  # bucket 由 execution_price_field 决定:
  #   twap_0930_1030 → am
  #   twap_1300_1400 → pm
